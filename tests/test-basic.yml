name: Test basic usage with skip_commit
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/tags/v1.0.0
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          homebrew_owner: test-owner
          homebrew_tap: homebrew-test
          formula_folder: Formula
          github_token: fake-token-for-testing
          commit_owner: test-user
          commit_email: test@example.com
          install: bin.install "my-tool"
          skip_commit: "true"
          debug: "true"
      - name: Assert action ran (skip_commit mode)
        run: |
          echo "Action completed (may fail due to fake token, but inputs were accepted)"
          echo "PASS"
