name: Test optional inputs coverage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          homebrew_owner: test-owner
          homebrew_tap: homebrew-test
          formula_folder: Formula
          branch: main
          github_token: fake-token-for-skip-commit
          commit_owner: test-bot
          commit_email: test-bot@example.com
          depends_on: |
            "openssl@3"
            "libssh2"
          install: 'bin.install "my-tool"'
          test: 'system "#{bin}/my-tool", "--version"'
          download_strategy: CurlDownloadStrategy
          custom_require: custom_download_strategy
          formula_includes: |
            head "https://github.com/test/test.git"
          skip_commit: "true"
          skip_checksum: "true"
          debug: "true"
          ignore_warnings: "true"
        continue-on-error: true
      - name: Assert action ran with optional inputs
        run: |
          echo "Action completed with optional inputs (skip_commit=true)"
          echo "PASS"
