name: Test basic usage with skip_commit
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/tags/v1.0.0
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          homebrew_owner: test-owner
          homebrew_tap: homebrew-test
          formula_folder: Formula
          branch: main
          github_token: fake-token-for-skip-commit
          commit_owner: Test User
          commit_email: test@example.com
          install: bin.install "my-tool"
          test: system "#{bin}/my-tool --version"
          skip_commit: "true"
          debug: "true"
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "Action completed (skip_commit=true, may fail due to missing release assets)"
          echo "PASS"
